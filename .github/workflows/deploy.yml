name: Daily Update & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드 선택 (full: 데이터수집+글생성+배포, deploy_only: 현재 main 기준 배포만)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - deploy_only

permissions:
  contents: write

concurrency:
  group: daily-update-deploy-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  update-and-deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: '[공통] 리포트 실행 컨텍스트 초기화 (full 모드)'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          echo "RUN_STARTED_AT_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "REPORT_DATE_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          mkdir -p runs/daily

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: '[1단계] 인천 지역 정보 수집'
        id: collect_incheon
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-incheon.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: '[1단계] 전국 보조금 정책 수집'
        id: collect_subsidy
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-subsidy.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: '[1단계] 전국 축제·여행 정보 수집'
        id: collect_festival
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-festival.js
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: '[1단계] 만료 콘텐츠 처리'
        id: cleanup_expired
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/cleanup-expired.js

      - name: '[1단계] 변경사항 커밋 & 푸시 (공공데이터)'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data scripts/cleanup-expired.js
          if ! git diff-index --quiet HEAD; then
            git commit -m "자동 업데이트(1단계): 공공데이터 동기화 $(date +'%Y-%m-%d')"
            git push
          else
            echo "변경사항 없음"
          fi

      - name: '[1단계] Next.js 빌드'
        id: build_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: 'ca-pub-5984189992308575'

      - name: '[1단계] Playwright 브라우저 설치'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npx playwright install --with-deps chromium

      - name: '[1단계] Playwright E2E 테스트 (배포 전)'
        id: e2e_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: '[1단계] Cloudflare Pages 배포'
        id: deploy_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          set -eo pipefail
          DEPLOY_LOG=$(mktemp)
          npx wrangler pages deploy out --project-name=my-local-info 2>&1 | tee "$DEPLOY_LOG"
          DEPLOY_URL=$(grep -Eo 'https://[a-z0-9-]+\.my-local-info-2gs\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: '[2단계] AI 블로그 글 자동 생성 (카테고리별 1편)'
        id: generate_blog
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/generate-blog-post.js
        timeout-minutes: 30
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-2.5-flash-lite'
          GEMINI_MAX_OUTPUT_TOKENS: '8192'
          GEMINI_TIMEOUT_MS: '120000'
          BLOG_MAX_GENERATION_SECONDS: '900'
          BLOG_MAX_CANDIDATES_PER_CATEGORY: '3'
          BLOG_GEMINI_MIN_DELAY_MS: '5000'
          BLOG_MAX_API_CALLS: '10'
          BLOG_DAILY_BUDGET_KRW: '500'
          GEMINI_ESTIMATED_KRW_PER_1K_OUTPUT_TOKENS: '2.0'

      - name: '[2단계] Next.js 빌드'
        id: build_stage2
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: 'ca-pub-5984189992308575'

      - name: '[2단계] Playwright E2E 테스트 (배포 전)'
        id: e2e_stage2
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: '[2단계] Cloudflare Pages 배포'
        id: deploy_stage2
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          set -eo pipefail
          DEPLOY_LOG=$(mktemp)
          npx wrangler pages deploy out --project-name=my-local-info 2>&1 | tee "$DEPLOY_LOG"
          DEPLOY_URL=$(grep -Eo 'https://[a-z0-9-]+\.my-local-info-2gs\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: '[2단계] 변경사항 커밋 & 푸시 (블로그)'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/content/posts
          if ! git diff-index --quiet HEAD; then
            git commit -m "자동 업데이트(2단계): 블로그 3건 생성 $(date +'%Y-%m-%d')"
            git push
          else
            echo "변경사항 없음"
          fi

      - name: '[3단계] 일상의 즐거움 맛집 데이터 수집'
        id: collect_restaurants
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-life-restaurants.mjs
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: '[3단계] 일상의 즐거움 맛집 포스트 생성'
        id: generate_restaurant_posts
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/generate-life-restaurant-posts.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIFE_RESTAURANT_POSTS_PER_RUN: '3'
          LIFE_RESTAURANT_POSTS_PER_BUCKET: '1'

      - name: '[3단계] Next.js 빌드'
        id: build_stage3
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: 'ca-pub-5984189992308575'

      - name: '[3단계] Playwright E2E 테스트 (배포 전)'
        id: e2e_stage3
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: '[3단계] Cloudflare Pages 배포'
        id: deploy_stage3
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          set -eo pipefail
          DEPLOY_LOG=$(mktemp)
          npx wrangler pages deploy out --project-name=my-local-info 2>&1 | tee "$DEPLOY_LOG"
          DEPLOY_URL=$(grep -Eo 'https://[a-z0-9-]+\.my-local-info-2gs\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: '[3단계] 변경사항 커밋 & 푸시 (일상의 즐거움)'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/app/life/restaurant/data/restaurants.json src/content/life
          if ! git diff-index --quiet HEAD; then
            git commit -m "자동 업데이트(3단계): 맛집 3건 생성 $(date +'%Y-%m-%d')"
            git push
          else
            echo "변경사항 없음"
          fi

      - name: '[리포트] 일일 실행 요약 생성 (full 모드)'
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full'))
        run: node scripts/write-daily-report.mjs
        env:
          RUN_STARTED_AT_UTC: ${{ env.RUN_STARTED_AT_UTC }}
          REPORT_DATE_KST: ${{ env.REPORT_DATE_KST }}
          COLLECT_INCHEON_OUTCOME: ${{ steps.collect_incheon.outcome }}
          COLLECT_INCHEON_SUMMARY: ${{ steps.collect_incheon.outputs.collect_summary }}
          COLLECT_SUBSIDY_OUTCOME: ${{ steps.collect_subsidy.outcome }}
          COLLECT_SUBSIDY_SUMMARY: ${{ steps.collect_subsidy.outputs.collect_summary }}
          COLLECT_FESTIVAL_OUTCOME: ${{ steps.collect_festival.outcome }}
          COLLECT_FESTIVAL_SUMMARY: ${{ steps.collect_festival.outputs.collect_summary }}
          CLEANUP_EXPIRED_OUTCOME: ${{ steps.cleanup_expired.outcome }}
          BUILD_STAGE1_OUTCOME: ${{ steps.build_stage1.outcome }}
          E2E_STAGE1_OUTCOME: ${{ steps.e2e_stage1.outcome }}
          DEPLOY_STAGE1_OUTCOME: ${{ steps.deploy_stage1.outcome }}
          DEPLOY_STAGE1_URL: ${{ steps.deploy_stage1.outputs.deploy_url }}
          GENERATE_BLOG_OUTCOME: ${{ steps.generate_blog.outcome }}
          BLOG_BUDGET_ENABLED: ${{ steps.generate_blog.outputs.budget_enabled }}
          BLOG_BUDGET_LIMIT_KRW: ${{ steps.generate_blog.outputs.budget_limit_krw }}
          BLOG_ESTIMATED_COST_KRW: ${{ steps.generate_blog.outputs.estimated_cost_krw }}
          BLOG_BUDGET_STOPPED: ${{ steps.generate_blog.outputs.budget_stopped }}
          BLOG_BUDGET_STOP_REASON: ${{ steps.generate_blog.outputs.budget_stop_reason }}
          MID_IMAGE_INSERTED_COUNT: ${{ steps.generate_blog.outputs.mid_image_inserted_count }}
          MID_IMAGE_OMITTED_COUNT: ${{ steps.generate_blog.outputs.mid_image_omitted_count }}
          BUILD_STAGE2_OUTCOME: ${{ steps.build_stage2.outcome }}
          E2E_STAGE2_OUTCOME: ${{ steps.e2e_stage2.outcome }}
          DEPLOY_STAGE2_OUTCOME: ${{ steps.deploy_stage2.outcome }}
          DEPLOY_STAGE2_URL: ${{ steps.deploy_stage2.outputs.deploy_url }}
          COLLECT_RESTAURANTS_OUTCOME: ${{ steps.collect_restaurants.outcome }}
          GENERATE_RESTAURANT_POSTS_OUTCOME: ${{ steps.generate_restaurant_posts.outcome }}
          BUILD_STAGE3_OUTCOME: ${{ steps.build_stage3.outcome }}
          E2E_STAGE3_OUTCOME: ${{ steps.e2e_stage3.outcome }}
          DEPLOY_STAGE3_OUTCOME: ${{ steps.deploy_stage3.outcome }}
          DEPLOY_STAGE3_URL: ${{ steps.deploy_stage3.outputs.deploy_url }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}

      - name: '[리포트] GitHub Actions Summary 출력 (full 모드)'
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full'))
        run: |
          REPORT_MD="runs/daily/${REPORT_DATE_KST}.md"
          if [ -f "$REPORT_MD" ]; then
            cat "$REPORT_MD" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 리포트 파일이 아직 생성되지 않았습니다." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: '[리포트] 일일 실행 요약 커밋 & 푸시 (full 모드)'
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full'))
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add runs/daily
          if ! git diff-index --quiet HEAD; then
            git commit -m "자동 업데이트(리포트): 일일 실행 요약 $(date +'%Y-%m-%d')"
            git push
          else
            echo "리포트 변경사항 없음"
          fi

      - name: '[리포트] Telegram 알림 발송 (full 모드)'
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full'))
        run: node scripts/notify-telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE_KST: ${{ env.REPORT_DATE_KST }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: '[리포트] 최종 빌드 & 배포 (리포트 포함)'
        if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full'))
        run: |
          npm run build
          npx wrangler pages deploy out --project-name=my-local-info
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: '[공통] Playwright 브라우저 설치 (deploy_only / push)'
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy_only')
        run: npx playwright install --with-deps chromium

      - name: '[공통] Next.js 빌드 (deploy_only / push)'
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy_only')
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: 'ca-pub-5984189992308575'

      - name: '[공통] Playwright E2E 테스트 (deploy_only / push)'
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy_only')
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: '[공통] Cloudflare Pages 배포 (deploy_only / push)'
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy_only')
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
