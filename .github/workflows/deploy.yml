name: Daily Update & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '?�행 모드 ?�택 (full: ?�이?�수�?글?�성+배포, deploy_only: ?�재 main 기�? 배포�?'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - deploy_only

permissions:
  contents: write

concurrency:
  group: daily-update-deploy-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  update-and-deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: '[공통] 리포???�행 컨텍?�트 초기??(full 모드)'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          echo "RUN_STARTED_AT_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "REPORT_DATE_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d')" >> "$GITHUB_ENV"
          mkdir -p runs/daily

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: '[1?�계] ?�천 지???�보 ?�집'
        id: collect_incheon
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-incheon.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-3.1-flash-lite-preview'
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '2'

      - name: '[1?�계] ?�국 보조�??�책 ?�집'
        id: collect_subsidy
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-subsidy.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-3.1-flash-lite-preview'
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '5'

      - name: '[1?�계] ?�국 축제·?�행 ?�보 ?�집'
        id: collect_festival
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/collect-festival.js
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-3.1-flash-lite-preview'
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '2'

      - name: '[1?�계] 만료 콘텐�?처리'
        id: cleanup_expired
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: node scripts/cleanup-expired.js

      - name: '[1?�계] 변경사??커밋 & ?�시 (공공?�이??'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/data scripts/cleanup-expired.js
          if ! git diff-index --quiet HEAD; then
            git commit -m "?�동 ?�데?�트(1?�계): 공공?�이???�기??$(date +'%Y-%m-%d')"
            git push
          else
            echo "변경사???�음"
          fi

      - name: '[1?�계] Next.js 빌드'
        id: build_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_ADSENSE_ID: 'ca-pub-5984189992308575'

      - name: '[1?�계] Playwright 브라?��? ?�치'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npx playwright install --with-deps chromium

      - name: '[1?�계] Playwright E2E ?�스??(배포 ??'
        id: e2e_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: '[1?�계] Cloudflare Pages 배포'
        id: deploy_stage1
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          FILE_COUNT=$(find out -type f | wc -l)
          echo "out ?�일 ?? ${FILE_COUNT}"
          if [ "$FILE_COUNT" -gt 20000 ]; then
            echo "?�️ Cloudflare Pages ?�일 ???�한(20000) 초과�?배포�?건너?�니??"
            echo "deploy_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set -eo pipefail
          DEPLOY_LOG=$(mktemp)
          npx wrangler pages deploy out --project-name=my-local-info --branch=main --commit-hash="${GITHUB_SHA}" --commit-message="Automated deploy ${GITHUB_SHA}" 2>&1 | tee "$DEPLOY_LOG"
          DEPLOY_URL=$(grep -Eo 'https://[a-z0-9-]+\.my-local-info-2gs\.pages\.dev' "$DEPLOY_LOG" | tail -1 || true)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: '[1?�계] Cloudflare Cache Purge'
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        run: |
          PURGE_RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$PURGE_RESULT"
          echo "$PURGE_RESULT" | grep -q '"success":true' && echo "??Cache purged" || echo "?�️ Cache purge failed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: '[2?�계] ?�레?�터 ?�디???�트 ?�성 (editor_note)'
        id: generate_editor_notes
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
