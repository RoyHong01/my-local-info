name: Daily Update & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-and-deploy:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: 인천 지역 정보 수집
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/collect-incheon.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: 전국 보조금 정책 수집
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/collect-subsidy.js
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: 전국 축제·여행 정보 수집
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/collect-festival.js
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION_MARKDOWN_BATCH_LIMIT: '10'

      - name: 만료 콘텐츠 처리
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/cleanup-expired.js

      - name: AI 블로그 글 자동 생성
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 일상의 즐거움 맛집 데이터 수집
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/collect-life-restaurants.mjs
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: 일상의 즐거움 맛집 포스트 생성
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/generate-life-restaurant-posts.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LIFE_RESTAURANT_POSTS_PER_RUN: '6'
          LIFE_RESTAURANT_POSTS_PER_BUCKET: '2'

      - name: 변경사항 커밋 & 푸시
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "자동 업데이트: 데이터 수집 및 블로그 글 생성 $(date +'%Y-%m-%d')"
            git push
          else
            echo "변경사항 없음"
          fi

      - name: Next.js 빌드
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E 테스트 (배포 전)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: Cloudflare Pages 배포
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
